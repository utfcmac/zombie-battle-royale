<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zombie-Battle-Royale im Schulhof</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">

    <header id="hud">
        <div id="hearts" class="hud-cell" title="Leben"></div>
        <div id="timer" class="hud-cell" title="Zeit">⏱️ --</div>
        <div id="zombie-counter" class="hud-cell" title="Zombies in der Schule">🧟 --</div>
        <button id="help-btn" class="hud-cell" title="Hilfe (H)">❓</button>
        <button id="pause-btn" class="hud-cell" title="Pause (ESC)">⏸️</button>
        <button id="reset-btn" class="hud-cell" title="Neustart (löscht Speicherstand)">🔄</button>
        <div id="dev-nav" title="Dev: Station anspringen">
            <span class="dev-nav-label">DEV</span>
            <button data-scene="start"              title="01 Schulhof">1</button>
            <button data-scene="mensa_intro"        title="02 Mensa">2</button>
            <button data-scene="klassenraum_intro"  title="03 Klassenraum">3</button>
            <button data-scene="turnhalle_intro"    title="04 Turnhalle">4</button>
            <button data-scene="basketballplatz"    title="05 Basketballplatz">5</button>
            <button data-scene="dach"               title="06 Dach">6</button>
        </div>
    </header>

    <main id="stage">
        <div id="scene-image-wrap">
            <img id="scene-image" alt="Szenen-Bild">
            <div id="combat-area" class="hidden"></div>
            <div id="start-overlay" class="hidden">
                <button id="start-btn">▶ Spiel starten</button>
            </div>
        </div>
        <div id="scene-content">
            <div id="scene-text-wrap">
                <button id="scene-audio-btn" class="hidden" title="Sprecher-Intro abspielen / stoppen" aria-label="Sprecher-Intro abspielen">
                    <span class="speaker-icon">🔊</span>
                </button>
                <div id="scene-text"></div>
            </div>
            <div id="scene-choices"></div>
        </div>
    </main>

    <aside id="inventory">
        <div class="inventory-label">Inventar</div>
        <div id="inventory-slots"></div>
        <div class="inventory-hint">Taste 1–9</div>
    </aside>

    <div id="overlay" class="hidden">
        <div id="overlay-content"></div>
    </div>

</div>

<!-- Load-Reihenfolge: Items + Minispiele definieren globale Funktionen, die
     scenes.js in onSelect-Callbacks referenziert. engine.js ruft am Ende init(). -->
<script src="items.js"></script>
<script src="02_mensa/teller.js"></script>
<script src="03_klassenraum/labyrinth.js"></script>
<script src="04_turnhalle/seilklettern.js"></script>
<script src="05_basketballplatz/basketball.js"></script>
<script src="scenes.js"></script>
<script src="engine.js"></script>
</body>
</html>
